<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Windows Aero Login</title>
    <style>
        body {
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif;
        }
        .aero-window {
            width: 400px; background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); overflow: hidden;
        }
        .title-bar { padding: 10px 15px; font-size: 13px; }
        .content { background: #f0f0f0; margin: 1px; padding: 25px; display: flex; flex-direction: column; gap: 10px; }
        input { padding: 8px; border: 1px solid #abadb3; }
        .btn-continue {
            align-self: flex-end; padding: 5px 25px; margin-top: 10px;
            background: linear-gradient(to bottom, #f2f2f2, #cfcfcf);
            border: 1px solid #707070; border-radius: 3px; cursor: pointer;
        }
        #login-section, #final-section { display: flex; flex-direction: column; gap: 10px; }
        #final-section { display: none; }
        .error { color: red; font-size: 12px; display: none; }
    </style>
</head>
<body>
<div class="aero-window">
    <div class="title-bar">User Login</div>
    <div class="content">
        <div id="login-section">
            <label>Username:</label>
            <input type="text" id="user">
            <label>Password:</label>
            <input type="password" id="pass">
            <div id="login-err" class="error">Access Denied.</div>
            <button class="btn-continue" onclick="doLogin()">Login</button>
        </div>

        <div id="final-section">
            <label>Configuration Details:</label>
            <input type="text" placeholder="Enter notes...">
            <button class="btn-continue" onclick="window.location.reload()">Continue</button>
        </div>
    </div>
</div>

<script>
    const validUsers = {
        "Airon": "1122",
        "Admin": "2211",
        "vyk22": "1443"
    };

    function doLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        const err = document.getElementById('login-err');

        if (validUsers[u] && validUsers[u] === p) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('final-section').style.display = 'flex';
        } else {
            err.style.display = 'block';
        }
    }
</script>
</body>
</html>
